services:
  redis:
    image: redis:7
    container_name: cap2-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17
    container_name: cap2-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cap2
      POSTGRES_USER: cap2
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cap2 -d cap2"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: